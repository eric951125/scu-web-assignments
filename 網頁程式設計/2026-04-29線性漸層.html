<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026-04-29AM課堂練習</title>
    <style>
        /* 全域網頁樣式初始化 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f6fa;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        h3 {
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* 漸層展示卡片的通用樣式 */
        .gradient-card {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px; /* 圓角讓視覺更現代 */
            color: #ffffff;     /* 將預設文字改為白色 */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6); /* 加上文字陰影，確保在淺色漸層上也能看清文字 */
            font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); /* 淡淡的卡片陰影 */
        }

        /* 各別漸層效果獨立控制 */
        #ex1 { background: linear-gradient(to right, yellow, blue); }
        #ex2 { background: linear-gradient(to left, yellow, blue); }
        #ex3 { background: linear-gradient(to top, red, green); }
        #ex4 { background: linear-gradient(to bottom, red, green); }
        
        #ex5 {
            width: 100%;       /* 改為 100% 或 max-width，在手機上才不會爆版 */
            max-width: 400px;
            height: 200px;
            background: linear-gradient(to top right, green, yellow);
            /* 讓 ex5 的文字能在 200px 高度的卡片中垂直置中 */
            display: flex;
            align-items: center;
        }
        
        #ex6 { background: linear-gradient(to right, yellow, red, blue); }
        #ex7 { background: linear-gradient(to left, yellow, black 10%, red 30%, blue); }
    </style>
</head>
<body>

    <header>
        <h1>2026-04-29AM課堂練習</h1>
        <h3>CSS3 漸層效果應用 (Linear Gradient)</h3>
    </header>
    
    <main>
        <h2 id="ex1" class="gradient-card">漸層效果1：向右 (Yellow &rarr; Blue)</h2>
        <h2 id="ex2" class="gradient-card">漸層效果2：向左 (Yellow &rarr; Blue)</h2>
        <h2 id="ex3" class="gradient-card">漸層效果3：向上 (Red &rarr; Green)</h2>
        <h2 id="ex4" class="gradient-card">漸層效果4：向下 (Red &rarr; Green)</h2>
        <h2 id="ex5" class="gradient-card">漸層效果5：向東北角定高 (Green &rarr; Yellow)</h2>
        <h2 id="ex6" class="gradient-card">漸層效果6：三色漸層 (Yellow &rarr; Red &rarr; Blue)</h2>
        <h2 id="ex7" class="gradient-card">漸層效果7：自訂位置停靠點 (Color Stops)</h2>
    </main>

</body>
</html>
