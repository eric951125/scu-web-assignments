<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026-05-06課堂練習</title>
    
    <link rel="stylesheet" href="css/normal.css">
    
    <style>
        /* 基礎課堂練習美化樣式 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
        }

        h3 {
            color: #7f8c8d;
            margin-top: 0;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: #34495e;
        }

        /* 按鈕美化 */
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>

    <header>
        <h1>2026-05-06課堂練習</h1>
        <h3>JavaScript 基礎應用</h3>
    </header>

    <main>
        <p>Hello JavaScript</p>
        
        <button type="button" onclick="f1()">OKOK</button>  
    </main>

    <script src="script/exScript.js"></script>
</body>

</html>
